{% extends "base.html" %}

{% block title %}{{ title }}{% end %}

{% block content %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
    }
    .login-container {
        width: 400px;
        padding: 40px;
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .login-container h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #333;
        font-size: 24px;
    }
    .login-container .layui-form-item {
        margin-bottom: 20px;
    }
    .login-container .layui-btn-fluid {
        width: 100%;
    }
    .login-footer {
        text-align: center;
        margin-top: 20px;
        color: #999;
        font-size: 12px;
    }
    .error-msg {
        background: #fff5f5;
        border: 1px solid #ffccc7;
        color: #cf1322;
        padding: 10px 15px;
        border-radius: 4px;
        margin-bottom: 20px;
        font-size: 14px;
        text-align: center;
    }
</style>

<div class="login-container">
    <h2>{{ title }}</h2>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% end %}

    <form class="layui-form" method="post" action="/" id="login-form">
        {% module xsrf_form_html() %}
        <div class="layui-form-item">
            <input type="text" name="username" lay-verify="required" placeholder="请输入用户名"
                   autocomplete="off" class="layui-input" required>
        </div>
        <div class="layui-form-item">
            <input type="password" name="password" lay-verify="required" placeholder="请输入密码"
                   autocomplete="off" class="layui-input" id="password-input" required>
        </div>
        <div class="layui-form-item">
            <button type="submit" class="layui-btn layui-btn-fluid layui-btn-normal" lay-submit lay-filter="login">
                登 录
            </button>
        </div>
    </form>

    <div class="login-footer">
        <p>瞭望与问数系统 v0.1 · DataFinderAgentOS</p>
    </div>
</div>

<script>
// SHA256 实现 — 使用 TextEncoder 支持完整 UTF-8
function sha256(str) {
    function rotr(v, n) { return (v >>> n) | (v << (32 - n)); }

    var msg = new TextEncoder().encode(str);
    var H = new Int32Array([0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19]);
    var K = new Int32Array([0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2]);

    var bitLen = msg.length * 8;
    var padLen = (56 - (msg.length + 1) % 64 + 64) % 64;
    var buf = new Uint8Array(msg.length + 1 + padLen + 8);
    buf.set(msg);
    buf[msg.length] = 0x80;
    var hi = (bitLen / 0x100000000) | 0, lo = bitLen | 0;
    var view = new DataView(buf.buffer);
    view.setUint32(buf.length - 8, hi, false);
    view.setUint32(buf.length - 4, lo, false);

    for (var b = 0; b < buf.length; b += 64) {
        var W = new Uint32Array(64);
        for (var i = 0; i < 16; i++) W[i] = view.getUint32(b + i * 4, false);
        for (var i = 16; i < 64; i++) {
            var s0 = rotr(W[i-15],7)^rotr(W[i-15],18)^(W[i-15]>>>3);
            var s1 = rotr(W[i-2],17)^rotr(W[i-2],19)^(W[i-2]>>>10);
            W[i] = (W[i-16] + s0 + W[i-7] + s1) | 0;
        }
        var a=H[0],b2=H[1],c=H[2],d=H[3],e=H[4],f=H[5],g=H[6],h=H[7];
        for (var i=0;i<64;i++) {
            var S1=rotr(e,6)^rotr(e,11)^rotr(e,25);
            var ch=(e&f)^((~e)&g);
            var t1=(h+S1+ch+K[i]+W[i])|0;
            var S0=rotr(a,2)^rotr(a,13)^rotr(a,22);
            var maj=(a&b2)^(a&c)^(b2&c);
            var t2=(S0+maj)|0;
            h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b2;b2=a;a=(t1+t2)|0;
        }
        H[0]+=a;H[1]+=b2;H[2]+=c;H[3]+=d;H[4]+=e;H[5]+=f;H[6]+=g;H[7]+=h;
    }
    var hex='';for(var i=0;i<8;i++)hex+=((H[i]>>>0).toString(16).padStart(8,'0'));return hex;
}

// 表单提交前对密码做 SHA256 预处理，防止明文传输
document.getElementById('login-form').addEventListener('submit', function(e) {
    var pwdInput = document.getElementById('password-input');
    pwdInput.value = sha256(pwdInput.value);
});
</script>
{% end %}
